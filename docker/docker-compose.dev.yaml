services:
  backend:
    build:
      context: ../backend
      target: dev
    command: ./scripts/start-dev.sh
    volumes:
      - ../backend:/app
      - backend-venv:/app/.venv

  frontend:
    build:
      context: ../frontend
      target: dev
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  backend-venv:
  frontend-node-modules:
